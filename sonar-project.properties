sonar.projectKey=franzkade
sonar.organization=IP_Scanner

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=franzkade
sonar.projectVersion=0.1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=vs/frontend/src,vs/backend

# Exclude node_modules, build artifacts, and coverage
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/coverage/**,.next/**

# Test file patterns
sonar.tests=vs/frontend/src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/__tests__/**

# Code coverage reports
sonar.javascript.lcov.reportPaths=vs/frontend/coverage/lcov.info

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8
